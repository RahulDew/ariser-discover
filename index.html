<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#D66240" />
    <meta
      name="description"
      content="Sleek, modern Google Search client designed to search softly."
    />
    
    <!-- Open Graph (Facebook, Discord, Slack) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ariser Discover — Search softly" />
    <meta property="og:description" content="Sleek, modern Google Search client designed to search softly." />
    <meta property="og:image" content="https://ariser-discover.web.app/logo512.png" />
    <meta property="og:url" content="https://ariser-discover.web.app" />
    <meta property="og:site_name" content="Ariser Discover" />

    <!-- Twitter Card previews -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ariser Discover — Search softly" />
    <meta name="twitter:description" content="Sleek, modern Google Search client designed to search softly." />
    <meta name="twitter:image" content="https://ariser-discover.web.app/logo512.png" />

    <!-- Google Sitelinks Searchbox Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Ariser Discover",
      "url": "https://ariser-discover.web.app/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://ariser-discover.web.app/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <!-- iOS PWA Standalone features -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Ariser" />
    
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Ariser Discover</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
